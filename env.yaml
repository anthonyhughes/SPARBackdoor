name: ml_suite
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # --- Core System ---
  - python=3.10              # 3.10 is currently the most stable for interp tools
  - pip
  - git                      # Essential for installing bleeding-edge repos

  # --- GPU / Pytorch Stack (Standard) ---
  # These pull the correct CUDA version for your driver automatically
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4      # Adjust to 11.8 if you have an older GPU

  # --- Data Science Basics ---
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - tqdm                     # Progress bars are life
  - ipykernel                # For connecting to VS Code / Jupyter

  # --- The "Bespoke" Pip Section ---
  # We use pip for these because they update faster than Conda channels
  - pip:
    # 1. The Interpretability Stack
    - transformer_lens       # The library you asked for
    - circuitsvis            # Interactive attention visualizers
    - einops                 # Mandatory for tensor manipulation
    - fancy_einsum           # often used in interp tutorials
    - jaxtyping              # Type hints for tensors (used heavily in interp)
    - sae_lens               # (Optional) The new standard for Sparse Autoencoders

    # 2. HuggingFace Ecosystem
    - transformers
    - tokenizers
    - datasets
    - accelerate             # Multi-GPU/optimization
    - bitsandbytes           # For 8-bit/4-bit quantization (saving VRAM)
    - peft
    - trl
    - vllm
    - lm_eval[vllm]

    # 3. Developer Quality of Life
    - black                  # Formatter
    - ruff                   # Linter (fast)
    - jupyterlab
    - ipywidgets             # Required for CircuitsVis to render in notebooks